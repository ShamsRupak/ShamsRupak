<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340">
  <defs>
    <style type="text/css">
      /* ═══ GRADIENT COLOR CYCLING ═══ */
      @keyframes gradShift1 {
        0%   { stop-color: #7c3aed; }
        33%  { stop-color: #a855f7; }
        66%  { stop-color: #c084fc; }
        100% { stop-color: #7c3aed; }
      }
      @keyframes gradShift2 {
        0%   { stop-color: #c084fc; }
        33%  { stop-color: #d8b4fe; }
        66%  { stop-color: #a855f7; }
        100% { stop-color: #c084fc; }
      }
      .gs1 { animation: gradShift1 5s ease-in-out infinite; }
      .gs2 { animation: gradShift2 5s ease-in-out infinite; }

      /* ═══ ACCENT BAR GLOW ═══ */
      @keyframes barPulse {
        0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 4px rgba(168,85,247,0.5)); }
        50%      { opacity: 1;   filter: drop-shadow(0 0 8px rgba(168,85,247,0.8)); }
      }
      .bar-top, .bar-bot {
        animation: barPulse 2.5s ease-in-out infinite;
      }

      /* ═══ CURSOR BLINK ═══ */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0; }
      }
      .cursor { animation: blink 1s step-end infinite; }

      /* ═══ TERMINAL DOTS ═══ */
      @keyframes dotBreathe {
        0%, 100% { r: 6; }
        50%      { r: 7.5; }
      }
      .td-r { animation: dotBreathe 2s ease-in-out infinite; }
      .td-a { animation: dotBreathe 2s ease-in-out infinite 0.3s; }
      .td-g { animation: dotBreathe 2s ease-in-out infinite 0.6s; }

      /* ═══ NAME NEON GLOW — MULTI-LAYER ═══ */
      @keyframes neonPulse {
        0%, 100% {
          filter: drop-shadow(0 0 8px rgba(168,85,247,0.6))
                  drop-shadow(0 0 20px rgba(168,85,247,0.3))
                  drop-shadow(0 0 40px rgba(139,92,246,0.15));
        }
        50% {
          filter: drop-shadow(0 0 12px rgba(192,132,252,0.9))
                  drop-shadow(0 0 30px rgba(168,85,247,0.6))
                  drop-shadow(0 0 60px rgba(139,92,246,0.3));
        }
      }
      .name-neon {
        animation: neonPulse 3s ease-in-out infinite;
      }

      /* ═══ SUBTITLE GLOW ═══ */
      @keyframes subGlow {
        0%, 100% {
          filter: drop-shadow(0 0 4px rgba(192,132,252,0.3));
          opacity: 0.9;
        }
        50% {
          filter: drop-shadow(0 0 10px rgba(192,132,252,0.6));
          opacity: 1;
        }
      }
      .sub-glow { animation: subGlow 3.5s ease-in-out infinite; }

      /* ═══ FLOATING PARTICLES ═══ */
      @keyframes f1 {
        0%   { transform: translate(0,0); opacity: 0; }
        8%   { opacity: 0.8; }
        92%  { opacity: 0.8; }
        100% { transform: translate(35px,-90px); opacity: 0; }
      }
      @keyframes f2 {
        0%   { transform: translate(0,0); opacity: 0; }
        8%   { opacity: 0.6; }
        92%  { opacity: 0.6; }
        100% { transform: translate(-40px,-80px); opacity: 0; }
      }
      @keyframes f3 {
        0%   { transform: translate(0,0); opacity: 0; }
        8%   { opacity: 0.7; }
        92%  { opacity: 0.7; }
        100% { transform: translate(25px,-95px); opacity: 0; }
      }
      @keyframes f4 {
        0%   { transform: translate(0,0); opacity: 0; }
        8%   { opacity: 0.5; }
        92%  { opacity: 0.5; }
        100% { transform: translate(-45px,-70px); opacity: 0; }
      }
      @keyframes f5 {
        0%   { transform: translate(0,0); opacity: 0; }
        8%   { opacity: 0.7; }
        92%  { opacity: 0.7; }
        100% { transform: translate(30px,-85px); opacity: 0; }
      }
      @keyframes f6 {
        0%   { transform: translate(0,0); opacity: 0; }
        8%   { opacity: 0.5; }
        92%  { opacity: 0.5; }
        100% { transform: translate(-20px,-75px); opacity: 0; }
      }
      .p1 { animation: f1 6s ease-in-out infinite; }
      .p2 { animation: f2 8s ease-in-out infinite 0.8s; }
      .p3 { animation: f3 7s ease-in-out infinite 1.6s; }
      .p4 { animation: f4 9s ease-in-out infinite 0.4s; }
      .p5 { animation: f5 7s ease-in-out infinite 2.5s; }
      .p6 { animation: f6 8s ease-in-out infinite 1.2s; }

      /* ═══ SCAN LINE ═══ */
      @keyframes scan {
        0%   { transform: translateY(-10px); opacity: 0; }
        3%   { opacity: 0.12; }
        97%  { opacity: 0.12; }
        100% { transform: translateY(350px); opacity: 0; }
      }
      .scanline { animation: scan 7s linear infinite; }

      /* ═══ TAG WAVE ═══ */
      @keyframes tagWave {
        0%, 100% { opacity: 0.3; }
        50%      { opacity: 0.6; }
      }
      .tw1 { animation: tagWave 3.5s ease-in-out infinite; }
      .tw2 { animation: tagWave 3.5s ease-in-out infinite 0.4s; }
      .tw3 { animation: tagWave 3.5s ease-in-out infinite 0.8s; }
      .tw4 { animation: tagWave 3.5s ease-in-out infinite 1.2s; }
      .tw5 { animation: tagWave 3.5s ease-in-out infinite 1.6s; }
      .tw6 { animation: tagWave 3.5s ease-in-out infinite 2.0s; }
      .tw7 { animation: tagWave 3.5s ease-in-out infinite 2.4s; }
      .tw8 { animation: tagWave 3.5s ease-in-out infinite 2.8s; }
      .tw9 { animation: tagWave 3.5s ease-in-out infinite 3.2s; }

      /* ═══ GRID BREATHE ═══ */
      @keyframes gridBreathe {
        0%, 100% { opacity: 0.025; }
        50%      { opacity: 0.06; }
      }
      .grid { animation: gridBreathe 5s ease-in-out infinite; }

      /* ═══ ORB FLOAT ═══ */
      @keyframes orbPulse {
        0%, 100% { opacity: 0.06; r: 180; }
        50%      { opacity: 0.14; r: 200; }
      }
      .orb1 { animation: orbPulse 4s ease-in-out infinite; }

      @keyframes orbPulse2 {
        0%, 100% { opacity: 0.03; r: 120; }
        50%      { opacity: 0.08; r: 140; }
      }
      .orb2 { animation: orbPulse2 5s ease-in-out infinite 1s; }

      /* ═══ CMD GLOW ═══ */
      @keyframes cmdGlow {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(124,58,237,0.2)); }
        50%      { filter: drop-shadow(0 0 6px rgba(124,58,237,0.5)); }
      }
      .cmd { animation: cmdGlow 4s ease-in-out infinite; }

      /* ═══ STATUS BREATHE ═══ */
      @keyframes statusBreathe {
        0%, 100% { opacity: 0.5; }
        50%      { opacity: 0.8; }
      }
      .status { animation: statusBreathe 4s ease-in-out infinite; }
    </style>

    <!-- ═══ GRADIENTS ═══ -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="40%" style="stop-color:#13111c"/>
      <stop offset="60%" style="stop-color:#170f23"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>

    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" class="gs1" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" class="gs2" style="stop-color:#c084fc"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d8b4fe"/>
      <stop offset="40%" style="stop-color:#c084fc"/>
      <stop offset="70%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#d8b4fe"/>
    </linearGradient>

    <linearGradient id="glowBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#a855f7;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#c084fc;stop-opacity:0.35"/>
      <stop offset="70%" style="stop-color:#a855f7;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </linearGradient>

    <radialGradient id="orbGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.4"/>
      <stop offset="60%" style="stop-color:#7c3aed;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="orbGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- ═══ BASE ═══ -->
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- ═══ AMBIENT GLOW ORBS ═══ -->
  <circle class="orb1" cx="600" cy="130" r="180" fill="url(#orbGrad1)"/>
  <circle class="orb2" cx="350" cy="200" r="120" fill="url(#orbGrad2)"/>
  <circle class="orb2" cx="850" cy="180" r="100" fill="url(#orbGrad2)"/>

  <!-- ═══ GRID ═══ -->
  <g class="grid">
    <line x1="0" y1="40" x2="1200" y2="40" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="340" stroke="#a855f7" stroke-width="0.3"/>
    <line x1="300" y1="0" x2="300" y2="340" stroke="#a855f7" stroke-width="0.3"/>
    <line x1="450" y1="0" x2="450" y2="340" stroke="#a855f7" stroke-width="0.3"/>
    <line x1="600" y1="0" x2="600" y2="340" stroke="#a855f7" stroke-width="0.3"/>
    <line x1="750" y1="0" x2="750" y2="340" stroke="#a855f7" stroke-width="0.3"/>
    <line x1="900" y1="0" x2="900" y2="340" stroke="#a855f7" stroke-width="0.3"/>
    <line x1="1050" y1="0" x2="1050" y2="340" stroke="#a855f7" stroke-width="0.3"/>
  </g>

  <!-- ═══ SCAN LINE ═══ -->
  <rect class="scanline" x="0" y="-10" width="1200" height="2" fill="#c084fc"/>

  <!-- ═══ FLOATING PARTICLES ═══ -->
  <circle class="p1" cx="80"   cy="270" r="2.5" fill="#c084fc"/>
  <circle class="p2" cx="250"  cy="300" r="2"   fill="#d8b4fe"/>
  <circle class="p3" cx="450"  cy="280" r="3"   fill="#a855f7"/>
  <circle class="p4" cx="700"  cy="310" r="2.2" fill="#c084fc"/>
  <circle class="p5" cx="920"  cy="275" r="2.8" fill="#d8b4fe"/>
  <circle class="p6" cx="1100" cy="290" r="2"   fill="#a855f7"/>
  <circle class="p3" cx="180"  cy="310" r="1.8" fill="#c084fc"/>
  <circle class="p1" cx="380"  cy="295" r="2.2" fill="#d8b4fe"/>
  <circle class="p5" cx="780"  cy="305" r="1.6" fill="#a855f7"/>
  <circle class="p2" cx="1020" cy="280" r="2.5" fill="#c084fc"/>
  <!-- Upper particles -->
  <circle class="p4" cx="120"  cy="55"  r="1.8" fill="#d8b4fe"/>
  <circle class="p6" cx="1080" cy="65"  r="2"   fill="#c084fc"/>
  <circle class="p1" cx="960"  cy="45"  r="1.5" fill="#a855f7"/>
  <circle class="p3" cx="550"  cy="40"  r="1.2" fill="#d8b4fe"/>

  <!-- ═══ ACCENT BARS (thicker + glowing) ═══ -->
  <rect class="bar-top" x="0" y="0" width="1200" height="4" fill="url(#accentBar)"/>
  <rect class="bar-bot" x="0" y="336" width="1200" height="4" fill="url(#accentBar)"/>

  <!-- ═══ TERMINAL DOTS ═══ -->
  <circle class="td-r" cx="35" cy="28" r="6" fill="#ff5f57"/>
  <circle class="td-a" cx="55" cy="28" r="6" fill="#febc2e"/>
  <circle class="td-g" cx="75" cy="28" r="6" fill="#28c840"/>
  <text x="130" y="33" fill="#8b949e" font-family="monospace" font-size="13">shams@nyc ~/projects</text>
  <rect class="cursor" x="295" y="20" width="9" height="16" fill="#c084fc"/>

  <!-- ═══ NAME — NEON GLOW ═══ -->
  <!-- Shadow layer for extra depth -->
  <text x="600" y="108" text-anchor="middle" fill="#7c3aed" font-family="sans-serif" font-weight="800" font-size="54" letter-spacing="-1" opacity="0.3">
    Shams Rupak
  </text>
  <!-- Main name with neon pulse -->
  <g class="name-neon">
    <text x="600" y="105" text-anchor="middle" fill="url(#nameGrad)" font-family="sans-serif" font-weight="800" font-size="54" letter-spacing="-1">
      Shams Rupak
    </text>
  </g>

  <!-- ═══ GLOW BAR BEHIND SUBTITLE ═══ -->
  <rect x="150" y="120" width="900" height="38" fill="url(#glowBar)" rx="4"/>

  <!-- ═══ SUBTITLE — GLOWING ═══ -->
  <g class="sub-glow">
    <text x="600" y="148" text-anchor="middle" fill="#c084fc" font-family="monospace" font-weight="600" font-size="20">
      Software Engineer  |  AI/ML Engineer
    </text>
  </g>

  <!-- ═══ COMMAND LINE — GLOWING ═══ -->
  <g class="cmd">
    <text x="210" y="195" fill="#a855f7" font-family="monospace" font-size="14">
      $ cargo build --release &amp;&amp; ./tinylang compile main.tl &amp;&amp; python sentinel.py --monitor
    </text>
  </g>
  <rect class="cursor" x="870" y="183" width="8" height="14" fill="#c084fc"/>

  <!-- ═══ TECH TAGS (wave pulse) ═══ -->
  <g transform="translate(600, 235)" text-anchor="middle">
    <rect class="tw1" x="-480" y="-14" width="80"  height="24" rx="4" fill="#7c3aed"/>
    <text x="-440" y="4" fill="#d8b4fe" font-family="monospace" font-size="11" text-anchor="middle">C++20</text>

    <rect class="tw2" x="-385" y="-14" width="65"  height="24" rx="4" fill="#7c3aed"/>
    <text x="-352" y="4" fill="#d8b4fe" font-family="monospace" font-size="11" text-anchor="middle">Rust</text>

    <rect class="tw3" x="-305" y="-14" width="80"  height="24" rx="4" fill="#7c3aed"/>
    <text x="-265" y="4" fill="#d8b4fe" font-family="monospace" font-size="11" text-anchor="middle">Python</text>

    <rect class="tw4" x="-210" y="-14" width="100" height="24" rx="4" fill="#7c3aed"/>
    <text x="-160" y="4" fill="#d8b4fe" font-family="monospace" font-size="11" text-anchor="middle">Compilers</text>

    <rect class="tw5" x="-95" y="-14" width="105" height="24" rx="4" fill="#7c3aed"/>
    <text x="-42" y="4" fill="#d8b4fe" font-family="monospace" font-size="11" text-anchor="middle">Streaming</text>

    <rect class="tw6" x="25"  y="-14" width="90"  height="24" rx="4" fill="#7c3aed"/>
    <text x="70" y="4" fill="#d8b4fe" font-family="monospace" font-size="11" text-anchor="middle">Backend</text>

    <rect class="tw7" x="130" y="-14" width="95"  height="24" rx="4" fill="#7c3aed"/>
    <text x="178" y="4" fill="#d8b4fe" font-family="monospace" font-size="11" text-anchor="middle">ML Ops</text>

    <rect class="tw8" x="240" y="-14" width="105" height="24" rx="4" fill="#7c3aed"/>
    <text x="292" y="4" fill="#d8b4fe" font-family="monospace" font-size="11" text-anchor="middle">LLM Agents</text>

    <rect class="tw9" x="360" y="-14" width="100" height="24" rx="4" fill="#7c3aed"/>
    <text x="410" y="4" fill="#d8b4fe" font-family="monospace" font-size="11" text-anchor="middle">PyTorch</text>
  </g>

  <!-- ═══ STATUS LINE ═══ -->
  <text class="status" x="600" y="285" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="13">
    M.S. Engineering AI @ Stony Brook  ·  NYC  ·  Open to SWE / ML roles 2026
  </text>

  <!-- ═══ BOTTOM PARTICLES ═══ -->
  <circle class="p1" cx="350" cy="315" r="1.5" fill="#c084fc" opacity="0.3"/>
  <circle class="p4" cx="450" cy="320" r="2"   fill="#d8b4fe" opacity="0.25"/>
  <circle class="p2" cx="550" cy="312" r="1.5" fill="#a855f7" opacity="0.3"/>
  <circle class="p5" cx="650" cy="318" r="2"   fill="#c084fc" opacity="0.25"/>
  <circle class="p3" cx="750" cy="315" r="1.5" fill="#d8b4fe" opacity="0.3"/>
  <circle class="p6" cx="850" cy="320" r="2"   fill="#a855f7" opacity="0.25"/>
</svg>
